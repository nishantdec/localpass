site_name: localpass
site_url: https://nishantdec.github.io/localpass/
site_description: "Production-grade documentation for localpass - offline-first, zero-knowledge password manager and WebExtension authenticator"
site_author: nishantdec

repo_name: nishantdec/localpass
repo_url: https://github.com/nishantdec/localpass

theme:
  name: material
  palette:
    # Light palette
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: slate
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark palette
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: slate
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css?v=1.3.0

extra_javascript:
  - javascripts/extra.js?v=1.3.0

plugins:
  - search:
      lang: en
      separator: '[\s\-,;]+'
  - awesome-pages:
      collapse_single_pages: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
