name: Deploy Documentation Portal

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Configure Git Author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy Versioned Docs
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Extract tag version
            TAG_VERSION=${GITHUB_REF#refs/tags/}
            echo "Deploying release tag: $TAG_VERSION"
            mike deploy --push --update-aliases "$TAG_VERSION" latest
          else
            echo "Deploying active branch main update"
            mike deploy --push --update-aliases dev latest
          fi
          mike set-default --push latest

      - name: Run Post-Deployment Diagnostics
        run: |
          echo "==== Git Branch List ===="
          git branch -a
          echo "==== Fetching gh-pages ===="
          git fetch origin gh-pages
          echo "==== gh-pages Commit Logs ===="
          git log -n 5 origin/gh-pages

