repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: markdownlint
        name: Markdown Style Linter
        entry: npx markdownlint-cli2 "docs/**/*.md" "*.md"
        language: node
        files: \.md$
        pass_filenames: false

      - id: link-checker
        name: Lychee Link Checker
        entry: lychee --offline --verbose "docs/**/*.md" "*.md"
        language: system
        files: \.md$
        pass_filenames: false
